# .github/workflows/pages.yml
name: Build & Publish vICE Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install project deps + Sphinx
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          # Install the package in editable mode so Sphinx autodoc can import simulator.*
          if [ -f pyproject.toml ] || [ -f setup.cfg ] || [ -f setup.py ]; then
            pip install -e .
          fi

          # Prefer the docs extra if pyproject.toml defines it; otherwise use a safe fallback.
          pip install -e ".[docs]" || pip install sphinx furo myst-parser sphinx-autodoc-typehints || pip install sphinx alabaster

      - name: Build simulator Sphinx docs
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          DOCS="simulator/docs"

          if [ ! -d "$DOCS" ]; then
            echo "Expected Sphinx docs directory not found: $DOCS"
            echo "Create simulator/docs with conf.py, index.rst, api.rst, _static/.gitkeep, and _templates/.gitkeep."
            exit 1
          fi

          echo "==> Building $DOCS"
          if [ -f "$DOCS/Makefile" ]; then
            make -C "$DOCS" html || sphinx-build -b html -W --keep-going "$DOCS" "$DOCS/_build/html"
          else
            sphinx-build -b html -W --keep-going "$DOCS" "$DOCS/_build/html"
          fi

      - name: Assemble site folder
        shell: bash
        run: |
          set -euo pipefail

          DOCS="simulator/docs"
          BUILT="$DOCS/_build/html"

          if [ ! -d "$BUILT" ]; then
            echo "Built docs directory not found: $BUILT"
            exit 1
          fi

          rm -rf _site
          mkdir -p _site
          touch _site/.nojekyll

          # Single-package project: publish simulator/docs directly at the GitHub Pages root.
          # The repository name is vICE, but the importable Python package remains simulator.
          # Do not publish under /simulator/ unless you intentionally want nested docs URLs.
          cp -R "$BUILT/"* _site/

          # Add a lightweight landing fallback only if Sphinx somehow did not emit index.html.
          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>vICE Documentation</title>
          </head>
          <body>
            <main>
              <h1>vICE Documentation</h1>
              <p>The Sphinx build completed, but no root index.html was produced.</p>
              <p>Check simulator/docs/index.rst and the Sphinx build output.</p>
            </main>
          </body>
          </html>
          HTML
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
