# .github/workflows/pages.yml
name: Build & Publish vICE Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install project deps + Sphinx
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          # Install the project in editable mode when packaging metadata exists.
          # This lets Sphinx autodoc import simulator.* modules from the repo.
          if [ -f pyproject.toml ] || [ -f setup.cfg ] || [ -f setup.py ]; then
            pip install -e .
          fi

          # Prefer a docs extra if available, but fall back to a conservative docs stack.
          pip install -e ".[docs]" || pip install sphinx furo myst-parser sphinx-autodoc-typehints || pip install sphinx alabaster

      - name: Regenerate simulator Sphinx skeleton/API index
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          # Keep api.rst synchronized with the current simulator module list.
          # This is important after adding new packages such as simulator.pumps.*.
          python -m simulator.cli sphinx-skel simulator/docs --force

          test -f simulator/docs/conf.py
          test -f simulator/docs/index.rst
          test -f simulator/docs/api.rst
          test -f simulator/docs/Makefile
          test -f simulator/docs/_static/.gitkeep
          test -f simulator/docs/_templates/.gitkeep

          echo "==> Generated API modules containing pump package entries:"
          grep -n "simulator.pumps" simulator/docs/api.rst || true

      - name: Build simulator Sphinx docs
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          DOCS="simulator/docs"
          BUILT="$DOCS/_build/html"

          if [ ! -d "$DOCS" ]; then
            echo "Expected Sphinx docs directory not found: $DOCS"
            echo "Create simulator/docs with conf.py, index.rst, api.rst, _static/.gitkeep, and _templates/.gitkeep."
            exit 1
          fi

          echo "==> Building $DOCS with warnings treated as errors"
          sphinx-build -b html -W --keep-going "$DOCS" "$BUILT"

      - name: Verify generated docs include pump API pages
        shell: bash
        run: |
          set -euo pipefail

          BUILT="simulator/docs/_build/html"

          if [ ! -d "$BUILT" ]; then
            echo "Built docs directory not found: $BUILT"
            exit 1
          fi

          if ! grep -R "simulator.pumps.water_pump" "$BUILT" >/dev/null 2>&1; then
            echo "Pump API documentation appears to be missing from built HTML."
            echo "Expected to find simulator.pumps.water_pump in $BUILT."
            exit 1
          fi

          if ! grep -R "simulator.pumps.combined" "$BUILT" >/dev/null 2>&1; then
            echo "Combined pump API documentation appears to be missing from built HTML."
            echo "Expected to find simulator.pumps.combined in $BUILT."
            exit 1
          fi

          if ! grep -R "simulator.pumps.pump_map" "$BUILT" >/dev/null 2>&1; then
            echo "Pump-map API documentation appears to be missing from built HTML."
            echo "Expected to find simulator.pumps.pump_map in $BUILT."
            exit 1
          fi

          echo "==> Pump API documentation found in built HTML."

      - name: Assemble site folder
        shell: bash
        run: |
          set -euo pipefail

          DOCS="simulator/docs"
          BUILT="$DOCS/_build/html"

          if [ ! -d "$BUILT" ]; then
            echo "Built docs directory not found: $BUILT"
            exit 1
          fi

          rm -rf _site
          mkdir -p _site
          touch _site/.nojekyll

          # Single-package project: publish simulator/docs directly at the GitHub Pages root.
          # The repository name is vICE, but the importable Python package remains simulator.
          # Do not publish under /simulator/ unless you intentionally want nested docs URLs.
          cp -R "$BUILT/"* _site/

          # Add a lightweight landing fallback only if Sphinx somehow did not emit index.html.
          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>vICE Documentation</title>
          </head>
          <body>
            <main>
              <h1>vICE Documentation</h1>
              <p>The Sphinx build completed, but no root index.html was produced.</p>
              <p>Check simulator/docs/index.rst and the Sphinx build output.</p>
            </main>
          </body>
          </html>
          HTML
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
