# .github/workflows/pages.yml
name: Build & Publish vICE Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install project deps + Sphinx
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          # Install the package in editable mode so Sphinx autodoc can import simulator.*
          if [ -f pyproject.toml ] || [ -f setup.cfg ] || [ -f setup.py ]; then
            pip install -e .
          fi

          # Prefer the docs extra if pyproject.toml defines it; otherwise use a safe fallback.
          pip install -e ".[docs]" || pip install sphinx furo myst-parser sphinx-autodoc-typehints || pip install sphinx alabaster

      - name: Regenerate simulator Sphinx skeleton
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          DOCS="simulator/docs"
          mkdir -p "$DOCS"

          # Keep api.rst synchronized with the latest CLI/module list.
          # simulator.cli generates package roots without :members: so autodoc
          # does not duplicate re-exported objects from __init__.py files.
          python -m simulator.cli sphinx-skel simulator/docs --force

          test -f "$DOCS/conf.py"
          test -f "$DOCS/index.rst"
          test -f "$DOCS/api.rst"
          test -f "$DOCS/Makefile"
          test -f "$DOCS/_static/.gitkeep"
          test -f "$DOCS/_templates/.gitkeep"

          echo "==> Generated API modules"
          grep -E '^simulator(\.|$)' "$DOCS/api.rst" || true

          # Guard against the duplicate-object failure seen when package roots
          # are documented with :members:. These blocks should be summaries only.
          python -c "from pathlib import Path; t=Path('simulator/docs/api.rst').read_text(encoding='utf-8'); modules=('simulator','simulator.pumps'); [(_ for _ in ()).throw(SystemExit(f'Missing automodule block for {m}')) for m in modules if t.find(f'.. automodule:: {m}\\n') == -1]; [(_ for _ in ()).throw(SystemExit(f'{m} block must not use :members:')) for m in modules for i in [t.find(f'.. automodule:: {m}\\n')] for e in [t.find('\\n\\n', i)] for block in [t[i:e if e != -1 else len(t)]] if ':members:' in block]"


      - name: Build simulator Sphinx docs
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          DOCS="simulator/docs"
          BUILT="$DOCS/_build/html"

          if [ ! -d "$DOCS" ]; then
            echo "Expected Sphinx docs directory not found: $DOCS"
            exit 1
          fi

          echo "==> Building $DOCS"
          sphinx-build -b html -W --keep-going "$DOCS" "$BUILT"

      - name: Verify generated pump API pages
        shell: bash
        run: |
          set -euo pipefail

          BUILT="simulator/docs/_build/html"
          test -d "$BUILT"

          # Verify the newly added pump modules made it into rendered HTML.
          grep -R "simulator.pumps.water_pump" "$BUILT"
          grep -R "simulator.pumps.combined" "$BUILT"
          grep -R "simulator.pumps.pump_map" "$BUILT"

      - name: Assemble site folder
        shell: bash
        run: |
          set -euo pipefail

          DOCS="simulator/docs"
          BUILT="$DOCS/_build/html"

          if [ ! -d "$BUILT" ]; then
            echo "Built docs directory not found: $BUILT"
            exit 1
          fi

          rm -rf _site
          mkdir -p _site
          touch _site/.nojekyll

          # Single-package project: publish simulator/docs directly at the GitHub Pages root.
          # The repository name is vICE, but the importable Python package remains simulator.
          cp -R "$BUILT/"* _site/

          # Add a lightweight landing fallback only if Sphinx somehow did not emit index.html.
          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>vICE Documentation</title>
          </head>
          <body>
            <main>
              <h1>vICE Documentation</h1>
              <p>The Sphinx build completed, but no root index.html was produced.</p>
              <p>Check simulator/docs/index.rst and the Sphinx build output.</p>
            </main>
          </body>
          </html>
          HTML
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
