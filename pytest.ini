# pytest.ini -- repo root for vICE (Virtual Internal Combustion Engine)
#
# Expected layout:
#   vice/
#     simulator/
#       tests/
#       core.py
#       cli.py
#       thermo/
#       tools/
#
# Run from the repo root with:
#   pytest

[pytest]
minversion = 8.0

testpaths =
    simulator/tests

python_files =
    test_*.py
    *_test.py

python_classes =
    Test*

python_functions =
    test_*

addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=simulator
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

xfail_strict = true

markers =
    cf: closed-form or symbolic reference checks
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch or sweep-style tests
    cantera: tests requiring Cantera
    coolprop: tests requiring CoolProp
    plotly: tests that generate or validate Plotly artifacts
    cli: command-line interface tests
    integration: multi-module integration tests

filterwarnings =
    # Treat deprecations from vICE itself as failures.
    error::DeprecationWarning:simulator(\.|$)
    error::PendingDeprecationWarning:simulator(\.|$)

    # Keep noisy optional/scientific dependencies from breaking normal test runs.
    ignore::DeprecationWarning:numpy(\.|$)
    ignore::DeprecationWarning:scipy(\.|$)
    ignore::DeprecationWarning:sympy(\.|$)
    ignore::DeprecationWarning:plotly(\.|$)
    ignore::DeprecationWarning:yaml(\.|$)
    ignore::DeprecationWarning:dearpygui(\.|$)
    ignore::DeprecationWarning:CoolProp(\.|$)
    ignore::DeprecationWarning:cantera(\.|$)
    ignore::DeprecationWarning:gekko(\.|$)

    ignore::PendingDeprecationWarning:numpy(\.|$)
    ignore::PendingDeprecationWarning:scipy(\.|$)
    ignore::PendingDeprecationWarning:sympy(\.|$)
    ignore::PendingDeprecationWarning:plotly(\.|$)
    ignore::PendingDeprecationWarning:yaml(\.|$)
    ignore::PendingDeprecationWarning:dearpygui(\.|$)
    ignore::PendingDeprecationWarning:CoolProp(\.|$)
    ignore::PendingDeprecationWarning:cantera(\.|$)
    ignore::PendingDeprecationWarning:gekko(\.|$)
